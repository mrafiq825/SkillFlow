name: Bug Report
description: Report a bug or unexpected behavior in skills-cli
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g. "When running skills validate, it throws a TypeError..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `skills init`
        2. Create a folder with...
        3. Run `skills validate`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: e.g. "The validation should fail and list the missing properties."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Node.js version, OS, shell, and package version.
      placeholder: |
        - OS: macOS 14.2
        - Node.js Version: v20.11.0
        - CLI Version: 1.0.0
        - Shell: zsh
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or logs about the problem here.
