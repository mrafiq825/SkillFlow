name: Question
description: Ask a question about using or configuring skills-cli
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: e.g. "How do I inherit custom configurations from another repository?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Explain the scenario or what you are trying to accomplish.
